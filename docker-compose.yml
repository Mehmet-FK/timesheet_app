services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timesheet_app}
      POSTGRES_USER: ${POSTGRES_USER:-timesheet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timesheet_user} -d ${POSTGRES_DB:-timesheet_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-timesheet_user}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-timesheet_app}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres_data:
