services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timesheet_app}
      POSTGRES_USER: ${POSTGRES_USER:-AlefAdmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Alef0415+}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-AlefAdmin} -d ${POSTGRES_DB:-timesheet_app}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      DATABASE_URL: postgres://${POSTGRES_USER:-AlefAdmin}:${POSTGRES_PASSWORD:-Alef0415+}@postgres:5432/${POSTGRES_DB:-timesheet_app}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  postgres_data:
  certbot_www:
  letsencrypt:
